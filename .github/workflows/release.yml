name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify version
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          TAG="${GITHUB_REF_NAME#v}"
          MANIFEST_VERSION="$(node -p "require('./public/manifest.json').version")"

          test "$VERSION" = "$TAG"
          test "$MANIFEST_VERSION" = "$VERSION"

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Package extension
        run: |
          ZIP_NAME="NeoFetchSpy-${GITHUB_REF_NAME}.zip"
          cd dist
          zip -r "../$ZIP_NAME" .
          cd ..
          echo "ZIP_NAME=$ZIP_NAME" >> "$GITHUB_ENV"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: NeoFetchSpy-${{ github.ref_name }}
          path: ${{ env.ZIP_NAME }}

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" "${ZIP_NAME}" \
            --title "NeoFetchSpy ${GITHUB_REF_NAME}" \
            --generate-notes
